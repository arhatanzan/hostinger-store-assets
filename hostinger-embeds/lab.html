<style> body, html { min-height: 800px; } </style>

<!-- Load Unified Styles -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/arhatanzan/hostinger-store-assets@main/store-style.css">

<!-- Generic HTML Container -->
<div class="prod-wrap" aria-live="polite">
  <div class="prod-header">
    <div class="prod-controls" id="controls">
      <div class="search"><input id="searchInput" placeholder="Search games..." /></div>
      <div class="controls-row">
        <select id="categorySelect" class="select"><option value="">All Categories</option></select>
        <select id="filter2Select" class="select"><option value="">All Levels</option></select>
        <select id="pageSizeSelect" class="select" style="display:none;"><option value="all">All</option></select>
        <select id="sortSelect" class="select">
          <option value="new">Newest</option><option value="az">A &rarr; Z</option><option value="za">Z &rarr; A</option>
        </select>
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </div>
  </div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display: none">No games found.</div>
  <div id="pagination" class="pagination-wrap" style="display: none"></div>
</div>
<button id="goTopBtn" aria-label="Go to top">↑ Top</button>

<!-- Configure the Logic for Games -->
<script>
  window.APP_CONFIG = {
    sheetId: "1UIpV8mZ21NTqJUWMbw5NK1V4cWFjuTbRUxpxlvOWljk",
    sheetName: "Games", 
    itemLabel: "games",

    // Drives the secondary dropdown
    getFilter2Value: (p) => p.difficulty || "",

    // Renders the difficulty tags
    renderTags: (p) => {
      const diff = (p.difficulty || "").toLowerCase();
      return diff ? `<span class="tag diff-${diff}">${diff}</span>` : "";
    },

    // Games don't have a middle block, so return empty string
    renderMetadata: (p) => "",

    // Renders the Play Now button
    renderPrimaryAction: (p) => {
      const href = p.productUrl || p.seoUrl || "#";
      return `<a class="download-btn" href="${href}" target="_top">Play Now</a>`;
    }
  };
</script>
<!-- Load Unified Logic -->
<script src="https://cdn.jsdelivr.net/gh/arhatanzan/hostinger-store-assets@main/store-logic.js"></script>
